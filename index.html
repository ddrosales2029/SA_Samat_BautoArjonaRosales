<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SA_Samat_BautoArjonaRosales</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Henny+Penny&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Henny Penny', cursive;
      background-color: #E4E5EA;
      background-image: none;
    }
    .product-card { 
      background-color: #ffffff;
      padding: 15px; 
      margin-bottom: 15px; 
      border-radius: 12px;
      border: 2px solid #d1d1d1;
      transition: transform 0.2s;
    }
    .product-card:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .cart-box { 
      background-color: #ffffff; 
      padding: 20px; 
      border-radius: 12px;
      border: 2px solid #d1d1d1;
      position: sticky;
      top: 20px;
    }
    .product-img {
      width: 100%;
      height: 180px;
      object-fit: contain;
      background-color: #f9f9f9;
      border-radius: 8px;
    }
    .shop-header {
      background-color: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body class="container p-4">

  <div class="text-center mb-4 p-4 shop-header">
    <h1 style="font-size: 60px; color: #333;">My Little Shop</h1>
    <p style="font-size: 20px; color: #666;">Friendship is… Shopping! ™</p>
    <a href="about.html" class="btn btn-outline-dark">About the Company</a> 
  </div>

  <div class="row">
    <div class="col-md-7">
      <h2 class="p-2 mb-3">Catalog</h2>
      <div id="catalog-area" class="row"></div>
    </div>

    <div class="col-md-5">
      <div class="cart-box">
        <h2>Your Cart</h2>
        <hr>
        <ul id="cart-items" class="list-unstyled"></ul>
        <hr>
        <p id="cart-total" class="fw-bold fs-4">Total: ₱0</p>

        <form method="POST" action="http://52.74.133.173/cs3/checkout.php" onsubmit="return func5()">
          <input type="text" name="cust_name" placeholder="Your Name" class="form-control mb-2" required>
          <input type="text" name="cust_addr" placeholder="Your Address" class="form-control mb-2" required>
          <input type="email" name="cust_email" placeholder="Your Email" class="form-control mb-2" required>
          <input type="hidden" id="cust_order" name="cust_order">
          
          <button type="submit" class="btn btn-dark w-100 mt-2">Checkout</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    let lis1 = [];
    const lis2 = [
      { prod_img: "https://tr.rbxcdn.com/180DAY-db3e22941a6af57f04a47d2f1052cedb/420/420/WaistAccessory/Webp/noFilter", prod_name: "Princess Dress", prod_price: 60 },
      { prod_img: "https://tr.rbxcdn.com/180DAY-26faf3074d086e80c3262a553e678aa0/420/420/BackAccessory/Webp/noFilter", prod_name: "Sad Chiikawa", prod_price: 135 },
      { prod_img: "https://i.imgur.com/H7ZxnHH.png", prod_name: "Refreshing Summer Hat", prod_price: 70 },
      { prod_img: "https://i.imgur.com/LlCLBAx.png", prod_name: "Teddy Bear", prod_price: 50 },
      { prod_img: "https://i.imgur.com/Dn1MNQr.png", prod_name: "Delicious Sandwich", prod_price: 60 },
      { prod_img: "https://tr.rbxcdn.com/180DAY-d949eb32ae4b61a4e737cddfc163daf7/420/420/BackAccessory/Webp/noFilter", prod_name: "Chiikawa Backpack", prod_price: 40 },
      { prod_img: "https://i.imgur.com/uxyNlKr.png", prod_name: "Giant Tuna", prod_price: 200 },
      { prod_img: "https://i.imgur.com/B8eMkEO.png", prod_name: "Beach Ball", prod_price: 135 },
      { prod_img: "https://i.imgur.com/NWBWEqy.png", prod_name: "Sombrero", prod_price: 70 },
      { prod_img: "https://i.imgur.com/4yOPACX.png", prod_name: "Rainbow Wings", prod_price: 500 },
      { prod_img: "https://i.imgur.com/JYP2LZr.png", prod_name: "Flower Hat", prod_price: 10 },
      { prod_img: "https://i.imgur.com/ECsGiHe.png", prod_name: "Kitty Cat", prod_price: 1000 },
      { prod_img: "https://tr.rbxcdn.com/180DAY-d03d867f0f5520e14cf35b80ee1a6636/420/420/BackAccessory/Webp/noFilter", prod_name: "Epic Sword", prod_price: 150 },
      { prod_img: "https://tr.rbxcdn.com/180DAY-26df6259a3626fa8d94e835fcdb8c660/420/420/WaistAccessory/Webp/noFilter", prod_name: "Red Potion", prod_price: 25 },
      { prod_img: "https://tr.rbxcdn.com/180DAY-fc9ec0ac70c7a424a6c66f06d197bfee/420/420/FaceAccessory/Webp/noFilter", prod_name: "Cool Glasses", prod_price: 85 },
      { prod_img: "https://tr.rbxcdn.com/180DAY-cff67ec73237c9960d715f491c99e10c/420/420/JacketAccessory/Webp/noFilter", prod_name: "Money Bag", prod_price: 999 },
      { prod_img: "https://tr.rbxcdn.com/180DAY-6ade8e989db8cda42dd5b27ff67c178b/420/420/Hat/Webp/noFilter", prod_name: "King Crown", prod_price: 450 },
      { prod_img: "https://tr.rbxcdn.com/180DAY-61aac6816a2a840973897c81889c20a6/420/420/BackAccessory/Webp/noFilter", prod_name: "Little Ghost", prod_price: 110 },
      { prod_img: "https://tr.rbxcdn.com/180DAY-067a9c5ca0a28835fd27f88a5d907af1/420/420/BackAccessory/Webp/noFilter", prod_name: "Bat Wings", prod_price: 320 },
      { prod_img: "https://tr.rbxcdn.com/180DAY-e80bd376d594edcc12d44a9666fdc24f/420/420/Hat/Webp/noFilter", prod_name: "Ninja Cowl", prod_price: 65 }
    ];

    function func1() {
      let var1 = document.getElementById("catalog-area");
      var1.innerHTML = ""; 
      lis2.forEach((val1, idx1) => {
        var1.innerHTML += `
        <div class="col-md-6">
          <div class="product-card text-center">
            <img src="${val1.prod_img}" alt="a picture of a ${val1.prod_name.toLowerCase()}" class="img-fluid mb-2 product-img" onerror="this.src='https://via.placeholder.com/150?text=Item'">
            <h5>${val1.prod_name}</h5>
            <p class="text-muted">Price: ₱${val1.prod_price}</p>
            <button class="btn btn-sm btn-outline-success w-100" onclick="func2(${idx1})">Add to Cart</button>
          </div>
        </div>`;
      });
    }

    function func2(par1) {
      lis1.push(lis2[par1]);
      func4();
    }

    function func3(par2) {
      lis1.splice(par2, 1);
      func4();
    }

    function func4() {
      let var2 = document.getElementById("cart-items");
      var2.innerHTML = "";
      let var3 = 0;

      lis1.forEach((val1, idx1) => {
        var3 += val1.prod_price;
        var2.innerHTML += `
          <li class="mb-2 d-flex justify-content-between align-items-center">
            <span>${val1.prod_name} <small class="text-muted">(₱${val1.prod_price})</small></span>
            <button class="btn btn-sm btn-link text-danger" onclick="func3(${idx1})">Remove</button>
          </li>`;
      });

      document.getElementById("cart-total").innerText = "Total: ₱" + var3;
    }

    function func5() {
      if(lis1.length === 0) {
        alert("Your cart is empty!");
        return false; 
      }
      document.getElementById("cust_order").value = JSON.stringify(lis1);
      return true; 
    }

    func1();
  </script>
</body>
</html>
