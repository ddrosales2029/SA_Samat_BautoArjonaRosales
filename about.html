<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Us - My Little Shop</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Henny+Penny&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Henny Penny', cursive;
      background-color: #E4E5EA;
    }
    .product-card { 
      background-color: #ffffff;
      padding: 15px; 
      margin-bottom: 15px; 
      border-radius: 12px;
      border: 2px solid #d1d1d1;
    }


    .product-img {
      width: 100%;
      height: 180px;
      object-fit: contain;
      background-color: #f9f9f9;
      border-radius: 8px;
    }
    .info-box {
      background-color: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

  </style>
</head>
<body class="container p-4">



  <div class="text-center mb-4 p-4 info-box">
    <h1 style="color: #333;">About the Company</h1>
    <a href="index.html" class="btn btn-outline-dark mt-2">Back to Shop</a> 
  </div>

  <div class="row">
    <div class="col-md-4">
      <div class="product-card text-center">
        <h5>Zi</h5>
        <p class="text-muted">Design & Initial Coder</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="product-card text-center">
        <h5>Aldein</h5>
        <p class="text-muted">Patching Bugs</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="product-card text-center">
        <h5>Gwen</h5>
        <p class="text-muted">Patching Bugs & Design</p>
      </div>
    </div>


  </div>

  <div class="info-box mt-4">
    <h4>References Used</h4>
    <hr>
    <ul>
      <li>Bootstrap 5 framework for grid layout and styling</li>
      <li>Google Fonts for the 'Henny Penny' typography</li>
      <li>Roblox Avatar Shop & Imgur for catalog item images</li>
    </ul>
    
  </div>

</body>
</html>
