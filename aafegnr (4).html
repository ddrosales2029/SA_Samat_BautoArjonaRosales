<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AA2_Samat_Rosales</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Henny+Penny&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Henny Penny', cursive;
      background-color: #E4E5EA;
      background-image: none;
    }
    .product-card { 
      background-color: #ffffff;
      padding: 15px; 
      margin-bottom: 15px; 
      border-radius: 12px;
      border: 2px solid #d1d1d1;
      transition: transform 0.2s;
    }
    .product-card:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .cart-box { 
      background-color: #ffffff; 
      padding: 20px; 
      border-radius: 12px;
      border: 2px solid #d1d1d1;
      position: sticky;
      top: 20px;
    }
    .product-img {
      width: 100%;
      height: 180px;
      object-fit: contain;
      background-color: #f9f9f9;
      border-radius: 8px;
    }
    .shop-header {
      background-color: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body class="container p-4">

  <div class="text-center mb-4 p-4 shop-header">
    <h1 style="font-size: 60px; color: #333;">My Little Shop</h1>
    <p style="font-size: 20px; color: #666;">Friendship is… Shopping! ™</p>
    <a href="about.html" class="btn btn-outline-dark">About the Company</a> 
  </div>

  <div class="row">
    <div class="col-md-7">
      <h3 class="p-2 mb-3">Catalog</h3>
      <div id="catalog-area" class="row"></div>
    </div>

    <div class="col-md-5">
      <div class="cart-box">
        <h3>Your Cart</h3>
        <hr>
        <ul id="cart-items" class="list-unstyled"></ul>
        <hr>
        <p id="cart-total" class="fw-bold fs-4">Total: ₱0</p>

        <form method="POST" action="http://52.74.133.173/cs3/checkout.php" onsubmit="return func5()">
          <input type="text" name="cust_name" placeholder="Your Name" class="form-control mb-2" required>
          <input type="text" name="cust_addr" placeholder="Your Address" class="form-control mb-2" required>
          <input type="email" name="cust_email" placeholder="Your Email" class="form-control mb-2" required>
          <input type="hidden" id="cust_order" name="cust_order">
          
          <button type="submit" class="btn btn-dark w-100 mt-2">Checkout</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    let lis1 = [];
    
    const lis2 = [
      { p1: "https://tr.rbxcdn.com/180DAY-db3e22941a6af57f04a47d2f1052cedb/420/420/WaistAccessory/Webp/noFilter", p2: "Princess Dress", p3: 60 },
      { p1: "https://tr.rbxcdn.com/180DAY-26faf3074d086e80c3262a553e678aa0/420/420/BackAccessory/Webp/noFilter", p2: "Sad Chiikawa", p3: 135 },
      { p1: "https://i.imgur.com/H7ZxnHH.png", p2: "Refreshing Summer Hat", p3: 70 },
      { p1: "https://i.imgur.com/LlCLBAx.png", p2: "Teddy Bear", p3: 50 },
      { p1: "https://i.imgur.com/Dn1MNQr.png", p2: "Delicious Sandwich", p3: 60 },
      { p1: "https://tr.rbxcdn.com/180DAY-d949eb32ae4b61a4e737cddfc163daf7/420/420/BackAccessory/Webp/noFilter", p2: "Chiikawa Backpack", p3: 40 },
      { p1: "https://i.imgur.com/uxyNlKr.png", p2: "Giant Tuna", p3: 200 },
      { p1: "https://i.imgur.com/B8eMkEO.png", p2: "Beach Ball", p3: 135 },
      { p1: "https://i.imgur.com/NWBWEqy.png", p2: "Sombrero", p3: 70 },
      { p1: "https://i.imgur.com/4yOPACX.png", p2: "Rainbow Wings", p3: 500 },
      { p1: "https://i.imgur.com/JYP2LZr.png", p2: "Flower Hat", p3: 10 },
      { p1: "https://i.imgur.com/ECsGiHe.png", p2: "Kitty Cat", p3: 1000 },
      { p1: "", p2: "Epic Sword", p3: 150 },
      { p1: "", p2: "Red Potion", p3: 25 },
      { p1: "", p2: "Cool Glasses", p3: 85 },
      { p1: "", p2: "Money Bag", p3: 999 },
      { p1: "", p2: "King Crown", p3: 450 },
      { p1: "", p2: "Little Ghost", p3: 110 },
      { p1: "", p2: "Bat Wings", p3: 320 },
      { p1: "", p2: "Ninja Cowl", p3: 65 }
    ];

    function func1() {
      let var1 = document.getElementById("catalog-area");
      var1.innerHTML = ""; 
      lis2.forEach((val1, idx1) => {
        var1.innerHTML += `
        <div class="col-md-6">
          <div class="product-card text-center">
            <img src="${val1.p1}" alt="a picture of a ${val1.p2.toLowerCase()}" class="img-fluid mb-2 product-img" onerror="this.src='https://via.placeholder.com/150?text=Item'">
            <h5>${val1.p2}</h5>
            <p class="text-muted">Price: ₱${val1.p3}</p>
            <button class="btn btn-sm btn-outline-success w-100" onclick="func2(${idx1})">Add to Cart</button>
          </div>
        </div>`;
      });
    }

    function func2(par1) {
      lis1.push(lis2[par1]);
      func4();
    }

    function func3(par2) {
      lis1.splice(par2, 1);
      func4();
    }

    function func4() {
      let var2 = document.getElementById("cart-items");
      var2.innerHTML = "";
      let var3 = 0;

      lis1.forEach((val1, idx1) => {
        var3 += val1.p3;
        var2.innerHTML += `
          <li class="mb-2 d-flex justify-content-between align-items-center">
            <span>${val1.p2} <small class="text-muted">(₱${val1.p3})</small></span>
            <button class="btn btn-sm btn-link text-danger" onclick="func3(${idx1})">Remove</button>
          </li>`;
      });

      document.getElementById("cart-total").innerText = "Total: ₱" + var3;
    }

    function func5() {
      if(lis1.length === 0) {
        alert("Your cart is empty!");
        return false; 
      }
      document.getElementById("cust_order").value = JSON.stringify(lis1);
      return true; 
    }

    func1();
  </script>
</body>
</html>
